<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Mind Care</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>🧠 Trading Mind Care</h1>
        <nav>
            <button class="tab active" data-tab="plans">📋 计划</button>
            <button class="tab" data-tab="review">🔥 复盘</button>
            <button class="tab" data-tab="matrix">📊 弱点矩阵</button>
            <button class="tab" data-tab="settings">⚙️ 设置</button>
        </nav>
    </header>

    <main>
        <!-- Plans Tab -->
        <section id="tab-plans" class="tab-content active">
            <div id="warnings-bar"></div>
            <div class="plans-grid">
                <div class="plan-col">
                    <h2>今日计划</h2>
                    <div id="today-plans"></div>
                    <div class="plan-input">
                        <textarea id="today-input" placeholder="输入今日计划..." rows="3"></textarea>
                        <button onclick="addPlan('today')">添加</button>
                    </div>
                </div>
                <div class="plan-col">
                    <h2>明日计划</h2>
                    <div id="tomorrow-plans"></div>
                    <div class="plan-input">
                        <textarea id="tomorrow-input" placeholder="输入明日计划..." rows="3"></textarea>
                        <button onclick="addPlan('tomorrow')">添加</button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Review Tab -->
        <section id="tab-review" class="tab-content">
            <div class="review-form">
                <label>今日盈亏（可选）</label>
                <input type="number" id="pnl-input" step="0.01" placeholder="正数为盈利，负数为亏损">
                <label>交易倾诉</label>
                <textarea id="emotion-input" rows="6" placeholder="今天交易中发生了什么？你的感受是什么？有没有违背计划的地方？"></textarea>
                <button id="submit-review" onclick="submitReview()">提交复盘 — 接受拷打</button>
            </div>
            <div id="critique-result" class="critique-box" style="display:none"></div>
            <h3>历史复盘</h3>
            <div id="review-history"></div>
        </section>

        <!-- Matrix Tab -->
        <section id="tab-matrix" class="tab-content">
            <h2>弱点矩阵</h2>
            <p class="hint">权重越高，说明该弱点近期越活跃。系统每日自动衰减未触发的弱点。</p>
            <table id="matrix-table">
                <thead><tr><th>弱点</th><th>权重</th><th>触发次数</th><th>最近触发</th><th>操作</th></tr></thead>
                <tbody></tbody>
            </table>
        </section>

        <!-- Settings Tab -->
        <section id="tab-settings" class="tab-content">
            <div class="settings-section">
                <h2>LLM 配置</h2>
                <label>Base URL</label>
                <input type="text" id="cfg-base-url" placeholder="https://token-plan-cn.xiaomimimo.com/v1">
                <label>API Key</label>
                <input type="password" id="cfg-api-key" placeholder="sk-...">
                <label>Model Name</label>
                <input type="text" id="cfg-model-name" placeholder="模型名称">
                <div class="btn-row">
                    <button onclick="saveLLM()">保存</button>
                    <button onclick="testLLM()" class="secondary">测试连接</button>
                </div>
                <div id="llm-test-result"></div>
            </div>
            <div class="settings-section">
                <h2>飞书通知</h2>
                <label>Webhook URL</label>
                <input type="text" id="cfg-feishu-webhook" placeholder="https://open.feishu.cn/open-apis/bot/v2/hook/...">
                <label>每日推送时间</label>
                <input type="text" id="cfg-notify-time" placeholder="08:30" value="08:30">
                <div class="btn-row">
                    <button onclick="saveFeishu()">保存</button>
                    <button onclick="testFeishu()" class="secondary">发送测试</button>
                </div>
                <div id="feishu-test-result"></div>
            </div>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
