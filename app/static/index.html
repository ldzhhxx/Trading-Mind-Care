<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Mind Care</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <div style="display:flex;justify-content:space-between;align-items:center">
            <h1>🧠 Trading Mind Care</h1>
            <button onclick="toggleTheme()" class="secondary" style="margin:0;padding:0.3rem 0.6rem;font-size:0.8rem" id="theme-btn">🌙</button>
        </div>
        <nav>
            <button class="tab active" data-tab="plans">📋 计划</button>
            <button class="tab" data-tab="review">🔥 复盘</button>
            <button class="tab" data-tab="matrix">📊 弱点矩阵</button>
            <button class="tab" data-tab="stats">📈 统计</button>
            <button class="tab" data-tab="daily">📅 日报</button>
            <button class="tab" data-tab="calendar">🗓️ 日历</button>
            <button class="tab" data-tab="settings">⚙️ 设置</button>
        </nav>
    </header>

    <main>
        <!-- Plans Tab -->
        <section id="tab-plans" class="tab-content active">
            <div id="warnings-bar"></div>
            <div class="plans-grid">
                <div class="plan-col">
                    <h2>今日计划</h2>
                    <div id="today-plans"></div>
                    <div class="plan-input">
                        <textarea id="today-input" placeholder="输入今日计划..." rows="2"></textarea>
                        <div style="display:flex;gap:0.4rem;margin-top:0.5rem">
                            <button onclick="addPlan('today')">添加</button>
                            <button class="secondary" onclick="saveAsTemplate('today')" style="font-size:0.8rem">存为模板</button>
                            <button class="secondary" onclick="copyYesterday()" style="font-size:0.8rem">复制昨日</button>
                        </div>
                    </div>
                </div>
                <div class="plan-col">
                    <h2>明日计划</h2>
                    <div id="tomorrow-plans"></div>
                    <div class="plan-input">
                        <textarea id="tomorrow-input" placeholder="输入明日计划..." rows="2"></textarea>
                        <div style="display:flex;gap:0.4rem;margin-top:0.5rem">
                            <button onclick="addPlan('tomorrow')">添加</button>
                            <button class="secondary" onclick="saveAsTemplate('tomorrow')" style="font-size:0.8rem">存为模板</button>
                        </div>
                    </div>
                </div>
            </div>
            <div id="templates-section" style="margin-top:1.5rem">
                <h3 style="margin-bottom:0.5rem">📌 计划模板 <small style="color:var(--text-dim);font-weight:normal">（点击插入）</small></h3>
                <div id="templates-list"></div>
            </div>
        </section>

        <!-- Review Tab -->
        <section id="tab-review" class="tab-content">
            <div class="review-form">
                <label>今日盈亏（可选）</label>
                <input type="number" id="pnl-input" step="0.01" placeholder="正数为盈利，负数为亏损">
                <label>交易倾诉</label>
                <textarea id="emotion-input" rows="5" placeholder="今天交易中发生了什么？你的感受是什么？有没有违背计划的地方？"></textarea>
                <button id="submit-review" onclick="submitReview()">提交复盘 — 接受拷打</button>
            </div>
            <div id="critique-result" class="critique-box" style="display:none"></div>
            <div class="section-header" style="margin-top:2rem">
                <h3>历史复盘</h3>
                <div style="display:flex;gap:0.5rem;align-items:center">
                    <input type="text" id="review-search" placeholder="搜索复盘..." style="padding:0.3rem 0.6rem;background:var(--surface);border:1px solid var(--surface2);color:var(--text);border-radius:var(--radius);font-size:0.8rem;width:140px" onkeydown="if(event.key==='Enter')searchReviews()">
                    <button class="secondary" onclick="searchReviews()" style="margin:0;padding:0.3rem 0.6rem;font-size:0.8rem">搜索</button>
                    <button class="secondary" onclick="exportReviews()" style="margin:0;padding:0.3rem 0.8rem;font-size:0.8rem">导出 JSON</button>
                </div>
            </div>
            <div id="review-history"></div>
            <div id="review-pagination" style="margin-top:1rem;text-align:center"></div>
        </section>

        <!-- Matrix Tab -->
        <section id="tab-matrix" class="tab-content">
            <div class="section-header">
                <h2>弱点矩阵</h2>
                <button class="secondary" onclick="exportMatrix()" style="margin:0;padding:0.3rem 0.8rem;font-size:0.8rem">导出 JSON</button>
            </div>
            <p class="hint">权重越高，说明该弱点近期越活跃。系统每日自动衰减未触发的弱点。</p>
            <div class="add-vuln-form" style="display:flex;gap:0.5rem;margin-bottom:1rem;flex-wrap:wrap;align-items:flex-end">
                <input id="vuln-tag-input" placeholder="弱点标签" style="flex:1;min-width:120px;padding:0.4rem 0.6rem;background:var(--surface);border:1px solid var(--surface2);color:var(--text);border-radius:var(--radius);font-size:0.85rem">
                <input id="vuln-weight-input" type="number" step="0.1" value="1.0" placeholder="权重" style="width:70px;padding:0.4rem 0.6rem;background:var(--surface);border:1px solid var(--surface2);color:var(--text);border-radius:var(--radius);font-size:0.85rem">
                <input id="vuln-desc-input" placeholder="描述（可选）" style="flex:1;min-width:120px;padding:0.4rem 0.6rem;background:var(--surface);border:1px solid var(--surface2);color:var(--text);border-radius:var(--radius);font-size:0.85rem">
                <button onclick="addVuln()" style="margin:0;padding:0.4rem 0.8rem;font-size:0.85rem">+ 手动添加</button>
            </div>
            <div id="matrix-chart"></div>
            <table id="matrix-table">
                <thead><tr><th>弱点</th><th>权重</th><th>触发次数</th><th>最近触发</th><th>操作</th></tr></thead>
                <tbody></tbody>
            </table>
        </section>

        <!-- Stats Tab -->
        <section id="tab-stats" class="tab-content">
            <h2 style="margin-bottom:1rem">统计面板</h2>
            <div id="stats-content"></div>
            <div style="margin-top:2rem;border-top:1px solid var(--surface2);padding-top:1.5rem">
                <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem">
                    <h3>📝 AI 每周总结</h3>
                    <button onclick="generateWeeklySummary()" id="weekly-btn" style="margin:0;padding:0.4rem 0.8rem;font-size:0.85rem">生成本周总结</button>
                </div>
                <div id="weekly-summary" class="critique-box" style="display:none"></div>
            </div>
        </section>

        <!-- Daily Report Tab -->
        <section id="tab-daily" class="tab-content">
            <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem">
                <h2>日报</h2>
                <input type="date" id="daily-date-input" style="background:var(--surface);border:1px solid var(--surface2);color:var(--text);padding:0.4rem 0.6rem;border-radius:var(--radius);font-size:0.9rem">
                <button onclick="loadDailyReport()" style="margin:0;padding:0.4rem 0.8rem;font-size:0.85rem">查看</button>
            </div>
            <div id="daily-content"></div>
        </section>

        <!-- Calendar Tab -->
        <section id="tab-calendar" class="tab-content">
            <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem">
                <h2>交易日历</h2>
                <button onclick="calendarPrev()" class="secondary" style="margin:0;padding:0.3rem 0.6rem">◀</button>
                <span id="calendar-month-label" style="font-size:1.1rem;font-weight:600"></span>
                <button onclick="calendarNext()" class="secondary" style="margin:0;padding:0.3rem 0.6rem">▶</button>
            </div>
            <div id="calendar-grid" class="calendar-grid"></div>
            <div class="calendar-legend" style="margin-top:1rem;display:flex;gap:1.5rem;font-size:0.8rem;color:var(--text-dim)">
                <span>🟢 盈利</span><span>🔴 亏损</span><span>⚪ 持平/无盈亏</span><span>⬜ 无记录</span>
            </div>
        </section>

        <!-- Settings Tab -->
        <section id="tab-settings" class="tab-content">
            <div class="settings-section">
                <h2>LLM 配置</h2>
                <label>Base URL</label>
                <input type="text" id="cfg-base-url" placeholder="https://api.openai.com/v1">
                <label>API Key</label>
                <input type="password" id="cfg-api-key" placeholder="sk-...">
                <label>Model Name</label>
                <input type="text" id="cfg-model-name" placeholder="gpt-4o-mini">
                <div class="btn-row">
                    <button onclick="saveLLM()">保存</button>
                    <button onclick="testLLM()" class="secondary">测试连接</button>
                </div>
                <div id="llm-test-result"></div>
            </div>
            <div class="settings-section">
                <h2>飞书通知</h2>
                <label>Webhook URL</label>
                <input type="text" id="cfg-feishu-webhook" placeholder="https://open.feishu.cn/open-apis/bot/v2/hook/...">
                <label>每日推送时间</label>
                <input type="text" id="cfg-notify-time" placeholder="08:30" value="08:30">
                <div class="btn-row">
                    <button onclick="saveFeishu()">保存</button>
                    <button onclick="testFeishu()" class="secondary">发送测试</button>
                </div>
                <div id="feishu-test-result"></div>
            </div>
            <div class="settings-section">
                <h2>拷打强度</h2>
                <label>强度等级（1=温和教练，5=极端毒舌）</label>
                <input type="range" id="cfg-intensity" min="1" max="5" value="3" style="width:100%">
                <div style="display:flex;justify-content:space-between;font-size:0.75rem;color:var(--text-dim)"><span>温和</span><span>中等</span><span>毒舌</span></div>
                <button onclick="saveIntensity()" style="margin-top:0.5rem">保存</button>
            </div>
            <div class="settings-section">
                <h2>数据管理</h2>
                <div class="btn-row" style="flex-wrap:wrap">
                    <button class="secondary" onclick="exportData('reviews','json')">导出复盘 JSON</button>
                    <button class="secondary" onclick="exportData('reviews','csv')">导出复盘 CSV</button>
                    <button class="secondary" onclick="exportData('vulnerabilities','json')">导出弱点 JSON</button>
                    <button class="secondary" onclick="exportData('vulnerabilities','csv')">导出弱点 CSV</button>
                    <button class="secondary" onclick="window.open('/api/data/backup')">下载数据库备份</button>
                </div>
                <label style="margin-top:1rem">导入复盘数据（JSON）</label>
                <input type="file" id="import-file" accept=".json" style="margin-top:0.3rem">
                <button onclick="importReviews()" style="margin-top:0.5rem">导入</button>
                <div id="import-result" style="margin-top:0.5rem;font-size:0.85rem"></div>
            </div>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
